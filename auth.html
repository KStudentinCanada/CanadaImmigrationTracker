<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up / Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header / Navbar -->
  <header class="header">
    <div class="container">
      <h1 class="logo">Immigration Tracker</h1>
      <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="auth.html" class="nav-link btn-primary">Sign Up / Login</a> <!-- single auth button -->
      </nav>
    </div>
  </header>

  <!-- Auth Section -->
  <section class="auth-section">
    <div class="container auth-container">
      <h2>Welcome</h2>
      <div class="tabs">
        <button id="signup-tab" class="tab-btn active">Sign Up</button>
        <button id="login-tab" class="tab-btn">Login</button>
      </div>

      <!-- Sign-Up Form -->
      <form id="signup-form" class="auth-form">
        <h3>Create an Account</h3>
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" placeholder="Enter username" required>

        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Enter password" required>

        <button type="submit" class="btn-primary">Sign Up</button>
      </form>

      <!-- Login Form -->
      <form id="login-form" class="auth-form hidden">
        <h3>Login to Your Account</h3>
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="Enter username" required>

        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter password" required>

        <button type="submit" class="btn-primary">Login</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Immigration Tracker. All rights reserved. | 
         <a href="aboutdev.html" class="dev-link">About the Developer</a>
      </p>
    </div>
  </footer>

  <!-- JS for Tab Switching -->
  <script>
    const signupTab = document.getElementById('signup-tab');
    const loginTab = document.getElementById('login-tab');
    const signupForm = document.getElementById('signup-form');
    const loginForm = document.getElementById('login-form');

    signupTab.addEventListener('click', () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    });

    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
    });
  </script>
</body>
</html>
